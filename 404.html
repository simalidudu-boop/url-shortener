<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Redirecting...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .container {
      text-align: center;
      padding: 2rem;
    }
    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid #21262d;
      border-top: 4px solid #58a6ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1.5rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    p { color: #8b949e; }
    a { color: #58a6ff; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .error-container { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <!-- Loading State -->
    <div id="loading">
      <div class="spinner"></div>
      <h1>Redirecting...</h1>
      <p>Please wait a moment.</p>
    </div>

    <!-- Error State -->
    <div id="error" class="error-container">
      <h1>🔗 Link Not Found</h1>
      <p>The short link <strong id="slug"></strong> doesn't exist.</p>
      <br>
      <a href="/">← Go to Homepage</a>
    </div>
  </div>

  <script>
    (async () => {
      // Get the slug from the URL path
      const path = window.location.pathname.replace(/^\//, '').replace(/\/$/, '');

      if (!path) {
        window.location.href = '/';
        return;
      }

      try {
        // Fetch the URL database
        const response = await fetch('/urls.json?v=' + Date.now());
        const urls = await response.json();

        // Case-insensitive lookup
        const slug = Object.keys(urls).find(
          key => key.toLowerCase() === path.toLowerCase()
        );

        if (slug && urls[slug]) {
          // Track click (optional - using a free analytics pixel)
          // new Image().src = `https://your-analytics.com/track?slug=${slug}`;

          // Redirect!
          window.location.replace(urls[slug]);
        } else {
          showError(path);
        }
      } catch (e) {
        console.error('Failed to load URLs:', e);
        showError(path);
      }
    })();

    function showError(slug) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error').style.display = 'block';
      document.getElementById('slug').textContent = '/' + slug;
    }
  </script>
</body>
</html>
